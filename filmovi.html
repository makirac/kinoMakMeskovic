<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>filmovi</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
}

ul{
list-style:none;
margin:0;
padding:0;
display:flex;
justify-content:center;
background:#333;
position:fixed;
top:0;
width:100%;
}

ul li{
padding:15px;
}

ul li a{
color:white;
text-decoration:none;
}

@media (max-width:600px){
ul{
flex-direction:column;
position:static;
}
}

.container{
margin-top:70px;
padding:20px;
}

section{
margin-bottom:40px;
}

.filmovi{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap:10px;
justify-items:center;
}

.film{
width:200px;
padding:10px;
text-align:center;
border:1px solid #ccc;
}

.film img{
width:100%;
height:250px;
object-fit:cover;
}

.trenutno{
background:white;
}

.uskoro{
background:powderblue;
}

.nema{
background:gray;
color:white;
}

@media (min-width:1080px){
.filmovi{
grid-template-columns: repeat(5, 1fr);
}
}

@media (max-width:800px){
.filmovi{
grid-template-columns: repeat(3, 1fr);
}
}

@media (max-width:300px){
.filmovi{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<ul>
<li><a href="#">Filmovi</a></li>
<li><a href="#">Raspored</a></li>
<li><a href="#">Sala</a></li>
</ul>

<div class="container">

<section id="akcija">
<h2>Akcija</h2>
<div class="filmovi">

<div class="film trenutno">
<img src="https://via.placeholder.com/200x250">
<h3>John Wick</h3>
<p>120 min</p>
</div>

<div class="film uskoro">
<img src="https://via.placeholder.com/200x250">
<h3>Fast X</h3>
<p>130 min</p>
</div>

<div class="film nema">
<img src="https://via.placeholder.com/200x250">
<h3>Mad Max</h3>
<p>110 min</p>
</div>

</div>
</section>

<section id="drama">
<h2>Drama</h2>
<div class="filmovi">

<div class="film trenutno">
<img src="https://via.placeholder.com/200x250">

</div>

<div class="film uskoro">
<img src="https://via.placeholder.com/200x250">
<h3>Joker</h3>
<p>122 min</p>
</div>

<div class="film nema">
<img src="https://via.placeholder.com/200x250">
<h3>Titanic</h3>
<p>195 min</p>
</div>

</div>
</section>

<section id="komedija">
<h2>Komedija</h2>

<img src="https://via.placeholder.com/200x250">

</div>

<div class="film uskoro">

</div>

<div class="film nema">

</div>

</div>
</section>

<section id="animirani">

</section>

</div>

</body>
</html>
